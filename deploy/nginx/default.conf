server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    etag off;

    # Video / dataset uploads (default nginx limit is 1m). 0 = no size cap.
    client_max_body_size 0;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # Root document: many browsers/proxies cache "/" separately from "/index.html".
    # If "/" stays stale after a new image ships, lazy-loaded /assets/*.js chunks 404.
    location = / {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /index.html =404;
    }

    # SPA shell must never be cached after deploys, otherwise it can reference
    # removed hashed chunks under /assets/ and lazy imports fail with 404.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Also cover any HTML route responses (e.g. `/` or direct deep-link hits)
    # so the browser never keeps an old app shell.
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # SPA UI routes under /projects (must come before the /projects API proxy).
    # See deploy/spa-project-routes.mjs — refreshing /projects/1/evaluations must serve index.html.
    location ~ ^/projects/new(/dataset)?/?$ {
        try_files /index.html =404;
    }
    location ~ ^/projects/[0-9]+/(evaluations|models|exports)/?$ {
        try_files /index.html =404;
    }
    location ~ ^/projects/[0-9]+/datasets/?$ {
        try_files /index.html =404;
    }
    location ~ ^/projects/[0-9]+/datasets/[0-9]+ {
        try_files /index.html =404;
    }
    location ~ ^/projects/[0-9]+/edit/?$ {
        try_files /index.html =404;
    }

    # Same-origin API proxy (VITE_API_URL=SAME_ORIGIN). Avoids browser blocks on
    # POST /training/*/test-inference when the UI is opened via LAN hostname.
    location ~ ^/(health-check|test-cors|training|tasks|projects|datasets|predictions|export|preannotate|segment|backup|database|system|pipelines|augmentations|models|static|data|dataset-groups|auto-annotate|images)(/|$) {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_pass http://backend:8000;
        client_max_body_size 0;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
    }

    location ~ ^/database/export {
        gzip off;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_pass http://backend:8000;
        client_max_body_size 0;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # WASM files are versioned by onnxruntime-web release (filenames are stable per version).
    # Cache aggressively — these are 92 MB total and never change between deploys unless
    # the onnxruntime-web package version changes.
    location /wasm/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
