name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Run tests
        env:
          CI: true
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run test -- --maxWorkers=1 --pool=forks --no-file-parallelism
