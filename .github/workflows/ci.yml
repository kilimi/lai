name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Run tests
        run: npx vitest run --coverage

      - name: Print coverage summary
        if: always()
        run: |
          if [ -f "./coverage/coverage-summary.json" ]; then
            echo "## Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              const badge = (pct) => pct >= 80 ? '🟢' : pct >= 50 ? '🟡' : '🔴';
              const lines = [
                '| Metric | Coverage |',
                '|--------|----------|',
                \`| Statements | \${badge(c.statements.pct)} \${c.statements.pct}% (\${c.statements.covered}/\${c.statements.total}) |\`,
                \`| Branches   | \${badge(c.branches.pct)} \${c.branches.pct}% (\${c.branches.covered}/\${c.branches.total}) |\`,
                \`| Functions  | \${badge(c.functions.pct)} \${c.functions.pct}% (\${c.functions.covered}/\${c.functions.total}) |\`,
                \`| Lines      | \${badge(c.lines.pct)} \${c.lines.pct}% (\${c.lines.covered}/\${c.lines.total}) |\`,
              ];
              console.log(lines.join('\n'));
            " >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️ Coverage report not generated" >> "$GITHUB_STEP_SUMMARY"
          fi

  marketing-tour:
    runs-on: ubuntu-latest
    # Marketing tour records screenshots + videos of happy-path flows.
    # It depends on a running backend (postgres + redis + mongo + FastAPI),
    # which we spin up via docker compose below. The job can still fail for
    # reasons unrelated to the rest of CI, so don't block the pipeline on it.
    continue-on-error: true
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Free up disk space
        # Backend image is ~5GB (PyTorch+CUDA base). Drop unused tooling.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          docker system prune -af || true
          df -h

      - name: Build and start backend stack
        env:
          # CI-local data dir so volumes don't try to mount ../.lai-data
          LAI_DATA_DIR: ${{ github.workspace }}/.lai-data-ci
        run: |
          mkdir -p "$LAI_DATA_DIR"/{projects,data,backups,runs,models,ai_models,redis,mongodb,postgres}
          docker compose \
            -f backend/docker-compose.yml \
            -f backend/docker-compose.ci.yml \
            up -d --build db redis mongodb backend

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend on http://localhost:9999/health-check ..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9999/health-check > /dev/null; then
              echo "✅ Backend is up"
              exit 0
            fi
            sleep 5
          done
          echo "❌ Backend did not become healthy in time"
          docker compose -f backend/docker-compose.yml -f backend/docker-compose.ci.yml ps
          docker compose -f backend/docker-compose.yml -f backend/docker-compose.ci.yml logs backend --tail=200
          exit 1

      - name: Run marketing tour
        run: npx playwright test --config=playwright.marketing.config.ts
        env:
          CI: 'true'
          TEST_API_URL: http://localhost:9999

      - name: Backend logs (on failure)
        if: failure()
        run: |
          docker compose -f backend/docker-compose.yml -f backend/docker-compose.ci.yml logs backend --tail=400 || true

      - name: Stop backend stack
        if: always()
        run: |
          docker compose -f backend/docker-compose.yml -f backend/docker-compose.ci.yml down -v || true


      - name: Upload marketing artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marketing-flows
          path: docs/flows/
          if-no-files-found: ignore
          retention-days: 14
