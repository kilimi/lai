# Build and push stack images to Docker Hub (for `lai pull` + LAI_*_IMAGE in .env).
# Manual only: GitHub → Actions → Docker publish → Run workflow.
name: Docker publish

on:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: "Docker tag for all lai-* images (e.g. latest, 0.1.0)"
        required: true
        default: latest
        type: string

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.workflow }}-${{ inputs.docker_tag }}
  cancel-in-progress: true

env:
  DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKER_TAG: ${{ inputs.docker_tag }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      docker_tag: ${{ inputs.docker_tag }}
      app_version: ${{ steps.ver.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: |
          v="$(grep '^version = ' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          echo "app_version=${v}" >> "$GITHUB_OUTPUT"

  publish-ultralytics:
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/lai-ultralytics
          tags: |
            type=raw,value=${{ needs.prepare.outputs.docker_tag }}
      - uses: docker/build-push-action@v6
        with:
          context: ./dockers/backend
          file: ./dockers/backend/Dockerfile.ultralytics.runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-mmyolo:
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/lai-mmyolo
          tags: |
            type=raw,value=${{ needs.prepare.outputs.docker_tag }}
      - uses: docker/build-push-action@v6
        with:
          context: ./dockers/backend
          file: ./dockers/backend/Dockerfile.mmyolo.runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-backend:
    needs: [prepare, publish-mmyolo]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/lai-backend
          tags: |
            type=raw,value=${{ needs.prepare.outputs.docker_tag }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./dockers/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MMYOLO_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/lai-mmyolo:${{ needs.prepare.outputs.docker_tag }}
            LAI_VERSION=${{ needs.prepare.outputs.app_version }}

  publish-worker-gpu:
    needs: [prepare, publish-ultralytics, publish-mmyolo]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/lai-worker-gpu
          tags: |
            type=raw,value=${{ needs.prepare.outputs.docker_tag }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./dockers/backend/Dockerfile.worker-gpu
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          additional-contexts: |
            docker_deps=./dockers/backend
          build-args: |
            ULTRALYTICS_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/lai-ultralytics:${{ needs.prepare.outputs.docker_tag }}
            MMYOLO_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/lai-mmyolo:${{ needs.prepare.outputs.docker_tag }}

  publish-worker-general:
    needs: [prepare, publish-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/lai-worker-general
          tags: |
            type=raw,value=${{ needs.prepare.outputs.docker_tag }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./dockers/backend/Dockerfile.worker-general
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          additional-contexts: |
            docker_deps=./dockers/backend

  publish-web:
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/lai-frontend
          tags: |
            type=raw,value=${{ needs.prepare.outputs.docker_tag }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dockers/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=SAME_ORIGIN
            VITE_APP_VERSION=${{ needs.prepare.outputs.app_version }}

  publish-sam:
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/lai-sam
          tags: |
            type=raw,value=${{ needs.prepare.outputs.docker_tag }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend/sam_service
          file: ./dockers/sam/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          additional-contexts: |
            docker_deps=./dockers/sam
