# Publish lai CLI + embedded compose bundle to PyPI on version tags.
name: PyPI release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Derive release version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build embedded compose bundle
        env:
          LAI_DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: bash scripts/build_dist_bundle.sh "${{ steps.ver.outputs.version }}"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/lai-*

      - name: Smoke check bundle in wheel
        run: |
          python -m pip install dist/lai-*.whl
          python -c "from lai.paths import embedded_bundle_dir; assert (embedded_bundle_dir()/'docker-compose.yml').is_file()"
          lai --version
          lai doctor || true
