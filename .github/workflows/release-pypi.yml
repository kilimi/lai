# Publish lai CLI + embedded compose bundle to PyPI (manual only).
name: PyPI release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version to publish (e.g. 0.1.0, without v prefix)"
        required: true
        default: "0.1.0"
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Derive release version
        id: ver
        run: echo "version=${{ inputs.release_version }}" >> "$GITHUB_OUTPUT"

      - name: Sync pyproject.toml version with release input
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys

          ver = os.environ["RELEASE_VERSION"].strip()
          if not re.fullmatch(r"\d+\.\d+\.\d+", ver):
              sys.exit(
                  f"release_version must look like 0.1.0 (digits and dots only); got {ver!r}"
              )

          path = "pyproject.toml"
          text = open(path, encoding="utf-8").read()
          new, n = re.subn(
              r'^version = ".*"',
              f'version = "{ver}"',
              text,
              count=1,
              flags=re.M,
          )
          if n != 1:
              sys.exit("Could not find project.version line in pyproject.toml")
          open(path, "w", encoding="utf-8").write(new)
          print(f'Synced pyproject.toml version to "{ver}"')
          PY

      - name: Build embedded compose bundle
        env:
          LAI_DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: bash scripts/build_dist_bundle.sh "${{ steps.ver.outputs.version }}"

      - name: Install build tools
        run: python -m pip install --upgrade pip build "twine>=6.1" "packaging>=24.2"

      - name: Build wheel and sdist
        run: python -m build

      - name: Validate distributions
        run: twine check dist/lai-${{ inputs.release_version }}*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload --verbose --non-interactive \
            "dist/lai-${{ inputs.release_version }}-py3-none-any.whl" \
            "dist/lai-${{ inputs.release_version }}.tar.gz"

      - name: Smoke check bundle in wheel
        run: |
          python -m pip install dist/lai-*.whl
          python -c "from lai.paths import embedded_bundle_dir; assert (embedded_bundle_dir()/'docker-compose.yml').is_file()"
          lai --version
          lai doctor || true
